# easy reloading of config
unbind r
bind r source-file ~/.config/tmux/tmux.conf
unbind C-b
set-option -g prefix C-f
bind-key C-f send-prefix
# allow mouse for pane resizing
set -g mouse on

# Smart pane/window navigation with vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

bind | split-window -h
bind - split-window -v

bind-key x kill-pane 
bind-key X kill-session
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g status-interval 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g status-position top
set -g automatic-rename off
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"

# Make status modules have rounded pills on both sides
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_fill "icon"

# Customize icons
set -g @catppuccin_session_icon " "
set -g @catppuccin_application_icon " "
set -g @catppuccin_application_text " #W"
set -g @catppuccin_cpu_icon " "
set -g @catppuccin_battery_icon " "
# set -g @catppuccin_directory_icon " "
# set -g @catppuccin_directory_text " #(path='#{pane_current_path}'; short=\"\${path/#\$HOME/~}\"; [ \${#short} -gt 50 ] && basename \"\$path\" || echo \"\$short\")"

# window tile with tkansparency fixes
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
# Default window colors
# Left
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_left_separator "#[fg=#{@thm_surface_0},bg="default"]#[bg="default",fg=#{@thm_surface_0}]"
set -g @catppuccin_window_middle_separator "#[fg=#{@thm_surface_0},bg="default"]"█"#[bg="default",fg=#{@thm_surface_0}]"
# Right
set -g @catppuccin_window_number_color "#{@thm_lavender}"
set -g @catppuccin_window_right_separator " #[bg="default",fg=#{@thm_lavender}]#[bg="default",fg=#{@thm_lavender}]"
# Current window colors
# Left
set -g @catppuccin_window_current_text_color "#{@thm_surface_1}"
set -g @catppuccin_window_current_left_separator "#[fg=#{@thm_surface_1},bg="default"]#[bg="default",fg=#{@thm_surface_1}]"
set -g @catppuccin_window_current_middle_separator "#[fg=#{@thm_surface_1},bg="default"]"█"#[bg="default",fg=#{@thm_surface_1}]"
# Right
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_current_right_separator " #[bg="default",fg=#{@thm_mauve}]#[bg="default",fg=#{@thm_mauve}]"
# Key transparency settings
set -g @catppuccin_status_background "none"

# Swap window number to the right side
set -g @catppuccin_window_number_position "right"

# Manually load catppuccin first to ensure module variables are available
run '~/.tmux/plugins/catppuccin/catppuccin.tmux'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}"
# set -ag status-left " "
# set -ag status-left "#{E:@catppuccin_status_directory}"
set -ag status-left "#[fg=#{@thm_overlay_2}] ◇◆ #[fg=default"
# set -g status-right "#{E:@catppuccin_status_application}"
set -g status-right " "
set -ag status-right " "
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right " "
set -agF status-right "#{E:@catppuccin_status_battery}"


set -Fg 'status-format[1]' '#{status-format[0]}'
set -g 'status-format[1]' ''
set -g status 2
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",ghostty:RGB"

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


